<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario para Objeto JavaScript</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <section class="form-card">
            <h1>Cadastro de Pagamento</h1>
            <p>Preencha o formulário para gerar um objeto JavaScript.</p>

            <form id="formCadastro">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>

                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>

                <label for="cpf">CPF</label>
                <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>

                <label for="meioPagamento">Meio de pagamento</label>
                <select id="meioPagamento" name="meioPagamento" required>
                    <option value="">Selecione uma opção</option>
                    <option value="Pix">Pix</option>
                    <option value="Cartao de credito">Cartao de crédito</option>
                    <option value="Cartao de debito">Cartao de débito</option>
                    <option value="Boleto">Boleto</option>
                    <option value="Dinheiro">Dinheiro</option>
                </select>

                <button type="submit">Gerar objeto</button>
            </form>
        </section>

        <section class="resultado-card">
            <h2>Objeto criado</h2>
            <pre id="resultado">Preencha e envie o formulario.</pre>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
