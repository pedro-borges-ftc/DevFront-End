<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabuada</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Tabuada de Multiplicacao</h1>
      <p>Digite um numero para ver a tabuada de 1 ate 10.</p>

      <div class="formulario">
        <label for="numero">Numero</label>
        <input type="number" id="numero" placeholder="Ex.: 7">
        <button type="button" id="btnCalcular">Mostrar tabuada</button>
      </div>

      <div class="resultado">
        <h2>Resultado</h2>
        <ul id="listaTabuada"></ul>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
