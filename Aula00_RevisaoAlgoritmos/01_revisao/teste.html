<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Soma de números</h1>

    <script>
        //leitura dos dados
        var num1 = Number(window.prompt("Digite o primeiro número: "));
        var num2 = Number(window.prompt("Digite o segundo número: "));

        //processamento do algoritmo
        var soma = num1 + num2

        //Saída do programa
        document.write("a soma é: " + soma);
    </script>
</body>
</html>
